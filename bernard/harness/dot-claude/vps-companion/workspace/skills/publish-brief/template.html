<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>{{TITLE}}</title>
<style>
  :root[data-theme="dark"] {
    --bg: #15171b;
    --text: #d6d3cc;
    --heading: #eae7e0;
    --muted: #9a968d;
    --link: #8fc4bc;
    --border: #2b2e35;
    --surface: #1c1f25;
    --surface-alt: #191c21;
    --accent: #4a6e68;
  }
  :root[data-theme="light"] {
    --bg: #f4f1ea;
    --text: #38362f;
    --heading: #26241f;
    --muted: #6e6a5f;
    --link: #25655c;
    --border: #ddd7c9;
    --surface: #ece8de;
    --surface-alt: #efebe2;
    --accent: #8aaaa3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 19px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 41em;
    margin: 0 auto;
    padding: 3.5rem 1.25rem 5rem;
  }
  h1, h2, h3, h4 { color: var(--heading); line-height: 1.3; }
  h1 { font-size: 1.55em; margin-bottom: 0.4em; }
  h2 { font-size: 1.25em; margin: 1.8em 0 0.5em; padding-top: 1em; border-top: 1px solid var(--border); }
  h3 { font-size: 1.05em; margin: 1.5em 0 0.4em; }
  p { margin: 0 0 1em; }
  a { color: var(--link); text-decoration-thickness: 1px; text-underline-offset: 3px; }
  ul, ol { margin: 0 0 1.1em 1.4em; }
  li { margin-bottom: 0.45em; }
  strong { color: var(--heading); }
  blockquote {
    border-left: 3px solid var(--accent);
    padding: 0.4em 0 0.4em 1em;
    margin: 0 0 1.1em;
    color: var(--muted);
  }
  code {
    background: var(--surface);
    border-radius: 4px;
    padding: 0.1em 0.35em;
    font-size: 0.9em;
  }
  pre { background: var(--surface); border-radius: 8px; padding: 1em; overflow-x: auto; margin: 0 0 1.1em; }
  pre code { background: none; padding: 0; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 0 0 1.3em;
    font-size: 0.92em;
  }
  th, td {
    text-align: left;
    padding: 0.55em 0.7em;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  th { color: var(--heading); background: var(--surface); }
  tr:nth-child(even) td { background: var(--surface-alt); }
  hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
  .meta { color: var(--muted); font-size: 0.85em; margin-bottom: 2.2em; }
  #theme-toggle {
    position: fixed;
    top: 0.9rem;
    right: 0.9rem;
    min-width: 44px;
    min-height: 44px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    font-size: 1.1rem;
    cursor: pointer;
  }
  @media print { #theme-toggle { display: none; } }
</style>
</head>
<body>
<button id="theme-toggle" aria-label="Switch between dark and light mode">☀️</button>
<main>
  <h1>{{TITLE}}</h1>
  <p class="meta">Prepared {{DATE}} · from {{PATIENT_NAME}}'s health wiki · private page</p>
  {{CONTENT}}
</main>
<script>
  (function () {
    var root = document.documentElement;
    var btn = document.getElementById('theme-toggle');
    function apply(theme) {
      root.setAttribute('data-theme', theme);
      btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    var saved = null;
    try { saved = localStorage.getItem('brief-theme'); } catch (e) {}
    apply(saved === 'light' ? 'light' : 'dark');
    btn.addEventListener('click', function () {
      var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      apply(next);
      try { localStorage.setItem('brief-theme', next); } catch (e) {}
    });
  })();
</script>
</body>
</html>
