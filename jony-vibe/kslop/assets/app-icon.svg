<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- KSLOP — App Store icon. Full-bleed opaque, no pre-rounded corners (Apple masks it). -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="46%" r="60%">
      <stop offset="0%" stop-color="#0A3D1E"/>
      <stop offset="55%" stop-color="#0A0E0A"/>
      <stop offset="100%" stop-color="#050705"/>
    </radialGradient>
    <radialGradient id="haloGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#00FF41" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="4" fill="#00FF41" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- opaque background -->
  <rect width="1024" height="1024" fill="url(#bgGlow)"/>
  <circle cx="512" cy="500" r="440" fill="url(#haloGlow)"/>

  <!-- The Bad Bot head, centered and scaled -->
  <g transform="translate(51,51) scale(1.8)">
    <!-- starburst backplate -->
    <polygon fill="#0A3D1E" stroke="#00FF41" stroke-width="6" stroke-linejoin="miter"
      points="256,31 300,160 422,100 362,222 491,266 362,310 422,432 300,372 256,501 212,372 90,432 150,310 21,266 150,222 90,100 212,160"/>

    <!-- antenna -->
    <g stroke="#05130A" stroke-width="14" stroke-linecap="round">
      <line x1="320" y1="122" x2="364" y2="52"/>
    </g>
    <circle cx="368" cy="46" r="30" fill="url(#eyeGlow)"/>
    <circle cx="368" cy="46" r="15" fill="#FFB000" stroke="#05130A" stroke-width="8"/>

    <!-- crest fin (pompadour homage) -->
    <path d="M132,132 C70,110 60,60 118,38 C186,12 282,28 330,72 C284,58 250,66 240,90 C216,64 160,80 132,132 Z"
          fill="#FFB000" stroke="#05130A" stroke-width="10" stroke-linejoin="round"/>
    <path d="M150,66 C176,48 216,42 252,50" fill="none" stroke="#E85D04" stroke-width="9" stroke-linecap="round"/>
    <path d="M126,96 C146,74 178,64 210,66" fill="none" stroke="#E85D04" stroke-width="9" stroke-linecap="round"/>

    <!-- head dome -->
    <rect x="136" y="96" width="240" height="212" rx="64" fill="#17E85F" stroke="#05130A" stroke-width="12"/>
    <circle cx="136" cy="212" r="22" fill="#0FBF4C" stroke="#05130A" stroke-width="10"/>
    <circle cx="376" cy="212" r="22" fill="#0FBF4C" stroke="#05130A" stroke-width="10"/>

    <!-- visor -->
    <rect x="158" y="128" width="196" height="66" rx="22" fill="#05130A"/>
    <polygon points="172,146 226,172 224,190 174,166" fill="#00FF41"/>
    <polygon points="340,146 286,172 288,190 338,166" fill="#00FF41"/>
    <circle cx="192" cy="160" r="5" fill="#EAFFF2"/>
    <circle cx="320" cy="160" r="5" fill="#EAFFF2"/>

    <!-- snout / muzzle -->
    <rect x="148" y="196" width="216" height="120" rx="48" fill="#0FBF4C" stroke="#05130A" stroke-width="12"/>
    <g fill="#05130A" opacity="0.9">
      <rect x="192" y="214" width="30" height="13" rx="6"/>
      <rect x="241" y="214" width="30" height="13" rx="6"/>
      <rect x="290" y="214" width="30" height="13" rx="6"/>
    </g>
    <path d="M170,252 Q256,298 342,252 Q350,286 302,302 Q256,312 210,302 Q162,286 170,252 Z"
          fill="#EAFFF2" stroke="#05130A" stroke-width="10" stroke-linejoin="round"/>
    <g stroke="#05130A" stroke-width="6" stroke-linecap="round">
      <line x1="210" y1="272" x2="212" y2="298"/>
      <line x1="246" y1="282" x2="247" y2="306"/>
      <line x1="282" y1="280" x2="283" y2="304"/>
      <line x1="316" y1="268" x2="314" y2="294"/>
    </g>
    <path d="M342,252 Q356,246 362,236" fill="none" stroke="#05130A" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- scanline overlay -->
  <rect width="1024" height="1024" fill="url(#scan)"/>
</svg>
