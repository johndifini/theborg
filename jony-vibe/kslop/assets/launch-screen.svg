      <stop offset="60%" stop-color="#0A0E0A"/>
      <stop offset="100%" stop-color="#050705"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="4" fill="#00FF41" opacity="0.04"/>
    </pattern>
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120,0 H0 V120" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.06"/>
    </pattern>
